<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Github Issues Tracker</title>
</head>
<body class="geist">
  <section class="border-y-2 shadow-2xl rounded-xs border-gray-300">
    <div class="flex justify-between mt-5 mb-5">
      <nav class="flex ml-15 gap-1">
          <img class=" w-8 h-8" src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="">
        <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
      </nav>
      <div class="flex gap-2 mr-10 ">
        <input class="border-gray h-10 w-70 rounded-xl" type="text" placeholder=" Search issues..." name="" id="">
        <button class="btn btn-primary">+ New Issue</button>
      </div>
    </div>
  </section>

  <section class="mx-35">
    <div class="border-2 border-gray-300 rounded-sm shadow-xl mt-10 gap-3">
      <button class="btn btn-primary w-25 mt-4 mb-4 ml-5" id="all" onclick="toggleStyle('all')">All</button>
      <button class="btn btn-primary w-25 mt-4 mb-4 ml-2 bg-gray-300 text-gray-600" id="opened" onclick="toggleStyle('opened')">Open</button>
      <button class="btn btn-primary w-25 mt-4 mb-4 ml-2  bg-gray-300 text-gray-600" id="closed" onclick="toggleStyle('closed')">Closed</button>
    </div>
  </section>


  <section class="flex justify-between border-2 border-gray-300 rounded-sm mx-35 mt-5 gap-3 p-2">
    <div class="flex items-center gap-2">
      <div>
      <img class="border-gray-700 bg-gray-300 h-8 w-8 rounded-3xl"src="./B13-A5-Github-Issue-Tracker/assets/Aperture.png" alt="">
      </div>
     <div>
      <h3 class="font-bold"><span id="totalnumbers" class="num">50</span> Issues</h3>
      <p class="font-light ">Track and manage your project issues</p>
     </div>
    </div>
    <div class="flex gap-3 mt-3 mr-3">
       <div class="flex gap-2">
        <img  class="h-3 w-3 mt-1.5"src="./B13-A5-Github-Issue-Tracker/assets/Ellipse 2 (1).png" alt="">Open
       </div>
       <div class="flex gap-2">
        <img class="h-3 w-3 mt-1.5" src="./B13-A5-Github-Issue-Tracker/assets/Ellipse 2.png" alt="">Closed
       </div>
    </div>
  </section>

  <section class="py-10 my-4 mx-35 grid grid-cols-4 sm:grid-cols-1 lg:grid-cols-4 px-5 rounded-2xl shadow-2xl allcard">
